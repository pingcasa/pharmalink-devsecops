name: Partners Pipeline

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image Docker du partenaire (ex: alpine:3.18)'
        required: true
        type: string
      partner_name:
        description: 'Nom du partenaire fournisseur'
        required: true
        type: string

jobs:
  validate-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull partner image
        run: docker pull ${{ github.event.inputs.image_name }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ github.event.inputs.image_name }}
          format: json
          output: trivy-results.json
          exit-code: '0'

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Grype scan
        run: |
          grype ${{ github.event.inputs.image_name }} -o json --file grype-results.json

      - name: Consolidate reports
        run: |
          python3 scripts/consolidate_reports.py \
            --trivy trivy-results.json \
            --grype grype-results.json \
            --image "${{ github.event.inputs.image_name }}" \
            --partner "${{ github.event.inputs.partner_name }}"

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: partner-scan-report
          path: reports/scan-report.json
          retention-days: 90