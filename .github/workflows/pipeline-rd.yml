name: Pipeline R&D - PharmaLink DevSecOps

on:
  push:
    branches: [main]

jobs:
  terraform:
    name: Terraform - Provisioning Azure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        working-directory: terraform/rd

      - name: Terraform Plan
        run: terraform plan
        working-directory: terraform/rd

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform/rd

  ansible:
    name: Ansible - Configuration VM
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini configure-ds.yml
        working-directory: ansible