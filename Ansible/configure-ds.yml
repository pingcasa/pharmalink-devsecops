- name: Configure DataScience VM
  hosts: vm
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Python3 and pip
      apt:
        name:
          - python3
          - python3-pip
        state: present

    - name: Install basic tools
      apt:
        name:
          - git
          - curl
          - docker.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started

    - name: Enable Docker at boot
      service:
        name: docker
        enabled: yes